# mag-loadtest configuration
# All sections and keys are optional; the values shown here are the defaults.

[server]
# Hostname or IP of the game server.
host = "127.0.0.1"
# TCP port of the game server.
port = 5555

[api]
# Base URL of the account API (HTTPS with self-signed cert accepted).
base_url = "https://127.0.0.1:5554"
# Shared account-API request rate for all simulated clients.
# The local Docker stack sees all bots as one source IP, so keep this very low.
requests_per_second = 30

[run]
# Number of bot clients to simulate concurrently.
# Each connected bot holds one persistent TCP/TLS socket to the game server
# for its whole session, plus a handful of shared keep-alive connections to
# the account API. For num_clients above a couple hundred, raise your shell's
# open-file limit before running (e.g. `ulimit -n 4096` on macOS/Linux,
# default is often 256 on macOS) or you'll see "Too many open files" (EMFILE)
# bootstrap errors once the limit is hit.
num_clients = 400
# Seconds over which all clients ramp up (connections staggered evenly).
ramp_up_secs = 5.0
# Total wall-clock test duration in seconds.
duration_secs = 1200.0
# Seconds between periodic metric summaries printed to stdout.
report_interval_secs = 10.0
# Minimum seconds between successive characters logging into the game server.
login_stagger_secs = 0.1

[movement]
# Maximum ± tile radius for random move targets around the bot's current position.
radius = 15
# Milliseconds between CL_MOVE commands.
interval_ms = 5000
# Enable one-shot login dispersion: right after a bot's first confirmed world
# position, it says the god password and then `/goto`s to a random in-bounds
# map location, before falling back to normal random movement. This spreads
# newly logged-in characters away from the shared spawn point so the server
# can keep placing new logins under heavy concurrent load.
# Requires the MAG_GOD_PASSWORD environment variable to be set (a .env file
# in the repo root is auto-loaded); the process fails fast at startup if this
# is true but MAG_GOD_PASSWORD is unset or empty.
enable_dispersion = true

[impairment]
# Fixed added outbound latency in milliseconds (0 = no impairment).
latency_ms = 0
# Random jitter applied on top of latency_ms (uniform ±jitter_ms/2).
jitter_ms = 0
# Probability [0.0, 1.0] that a move or ping packet is silently dropped.
# CL_CTICK keepalive packets are always sent; only movement and pings are dropped.
drop_pct = 0.0

[ping]
# Enable periodic CL_PING / SV_PONG round-trip latency measurement.
enabled = true
# Seconds between successive pings per client.
interval_secs = 5.0

[accounts]
# Deterministic username prefix; bot N gets username "{prefix}-{N}".
prefix = "loadtest"
# Email domain for account registration; bot N gets email "{prefix}-{N}@{domain}".
email_domain = "example.com"
# Shared password for all bot accounts.
password = "loadtest1234"
# Starting character class: "mercenary" | "templar" | "harakim"
class = "mercenary"
# Character sex: "male" | "female"
sex = "male"
