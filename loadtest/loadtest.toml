# mag-loadtest configuration
# All sections and keys are optional; the values shown here are the defaults.

[server]
# Hostname or IP of the game server.
host = "127.0.0.1"
# TCP port of the game server.
port = 5555

[api]
# Base URL of the account API (HTTPS with self-signed cert accepted).
base_url = "https://127.0.0.1:5554"

[run]
# Number of bot clients to simulate concurrently.
num_clients = 10
# Seconds over which all clients ramp up (connections staggered evenly).
ramp_up_secs = 5.0
# Total wall-clock test duration in seconds.
duration_secs = 60.0
# Seconds between periodic metric summaries printed to stdout.
report_interval_secs = 10.0

[movement]
# Maximum ± tile radius for random move targets around the bot's current position.
radius = 5
# Milliseconds between CL_MOVE commands.
interval_ms = 500

[impairment]
# Fixed added outbound latency in milliseconds (0 = no impairment).
latency_ms = 0
# Random jitter applied on top of latency_ms (uniform ±jitter_ms/2).
jitter_ms = 0
# Probability [0.0, 1.0] that a move or ping packet is silently dropped.
# CL_CTICK keepalive packets are always sent; only movement and pings are dropped.
drop_pct = 0.0

[ping]
# Enable periodic CL_PING / SV_PONG round-trip latency measurement.
enabled = true
# Seconds between successive pings per client.
interval_secs = 5.0

[accounts]
# Deterministic username prefix; bot N gets username "{prefix}-{N}".
prefix = "loadtest"
# Email domain for account registration; bot N gets email "{prefix}-{N}@{domain}".
email_domain = "example.com"
# Shared password for all bot accounts.
password = "loadtest1234"
# Starting character class: "mercenary" | "templar" | "harakim"
class = "mercenary"
# Character sex: "male" | "female"
sex = "male"
